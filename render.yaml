services:
  - type: web
    name: news-hub-app
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: GNEWS_API_KEY
        sync: false # ユーザーがRender管理画面で手動設定
      - key: PYTHON_VERSION
        value: 3.9.6
